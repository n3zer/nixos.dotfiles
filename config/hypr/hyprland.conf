monitor=,1920x1080,auto,auto

###################
### MY PROGRAMS ###
###################

# Set programs that you use
$terminal = foot
$fileManager = nautilus -w
$menu = rofi -show drun -show-icons -theme ~/nixos-dotfiles/config/rofi/theme.rasi
$editor = code
# if nvidia soported
$browser = env __NV_PRIME_RENDER_OFFLOAD=1 __GLX_VENDOR_LIBRARY_NAME=nvidia __VK_LAYER_NV_optimus=NVIDIA_only firefox


#################
### AUTOSTART ###
#################
exec-once = waybar
exec-once = waypaper --restore
exec-once = hyprlock



#############################
### ENVIRONMENT VARIABLES ###
#############################


env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24


#####################
### LOOK AND FEEL ###
#####################


source = ./src/look.conf

#############
### INPUT ###
#############

input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    kb_variant =
    kb_model =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################
source = ./src/keybindings.conf 


##############################
### WINDOWS AND WORKSPACES ###
##############################
source = ./src/windowrules.conf
