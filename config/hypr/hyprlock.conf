# ~/.config/hypr/hyprlock.conf

general {
    disable_loading_bar = true
    hide_cursor = true
    no_fade_in = false
  }

background {
  monitor = 
  path = screenshot
  blur_passes = 3
  blur_size = 6
}


label {
    monitor = 
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(247, 118, 142)
    font_size = 80
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
  }

label {
    monitor = 
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(255, 255, 255, 0.7)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor = 
    size = 200, 50
    position = 0, -50
    halign = center
    valign = center
    outer_color = rgb(247, 118, 142)
    inner_color = rgba(30, 30, 40, 0.8)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = rgba(100, 200, 100, 0.8)
    fail_color = rgba(200, 100, 100, 0.8)
  }

image {
    monitor = 
    path = /home/n3z/.face.icon
    size = 100
    position = 0, 100
    halign = center
    valign = center
    border_color = rgba(61, 174, 233, 0.8)
}

label {
    monitor =
    text = cmd[update:1000] echo "$(~/nixos-dotfiles/config/hypr/Scripts/songdetail.sh)" 
    color = rgba(255, 255, 255, 0.65)
    font_size = 14
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 100
    halign = center
    valign = bottom
}